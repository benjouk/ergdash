name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
            e2e/package-lock.json
      - run: npm ci
        working-directory: client
      - run: npm run build
        working-directory: client
      - run: npm ci
        working-directory: server
      - run: npm ci
        working-directory: e2e
      - run: npx playwright install --with-deps chromium
        working-directory: e2e
      - run: npx playwright test
        working-directory: e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ergdash:ci .
      - run: >-
          docker run -d --name ergdash-ci -p 3100:3000
          -e SESSION_SECRET=ci-only-session-secret-32-characters
          ergdash:ci
      - name: Wait for container health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3100/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs ergdash-ci
          exit 1
      - name: Verify LAN HTTP is not upgraded
        run: |
          curl -fsSI http://127.0.0.1:3100/ > /tmp/ergdash-headers
          ! grep -qi '^strict-transport-security:' /tmp/ergdash-headers
          ! grep -qi 'upgrade-insecure-requests' /tmp/ergdash-headers
      - if: always()
        run: docker rm -f ergdash-ci || true

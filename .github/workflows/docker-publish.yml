name: Publish Docker image

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ergdash:smoke .
      - run: >-
          docker run -d --name ergdash-smoke -p 3100:3000
          -e SESSION_SECRET=publish-smoke-secret-32-characters
          ergdash:smoke
      - name: Wait for container health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3100/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs ergdash-smoke
          exit 1
      - if: always()
        run: docker rm -f ergdash-smoke || true

  build-and-push:
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
